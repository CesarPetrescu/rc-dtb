version: '3'
services:
  backend:
    build: ./backend
    volumes:
      - ./backend/app.db:/app/app.db
    ports:
      - "8000:8000"
  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
